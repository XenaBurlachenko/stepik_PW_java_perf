name: test

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Проверка кода
        uses: actions/checkout@v4
      
      - name: Установка JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven
      
      - name: Установка браузеров Playwright и зависимостей
        run: |
          # Устанавливаем браузеры
          mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install chromium"
          # Устанавливаем системные зависимости
          sudo mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install-deps"
      
      - name: Создание директории для трассировок
        run: mkdir -p traces
      
      - name: Запуск тестов производительности
        run: mvn clean test
      
      - name: Проверка наличия трассировок
        run: |
          echo "Содержимое директории traces:"
          ls -la traces/ || echo "Директория traces пуста или не существует"
          echo "Содержимое target/surefire-reports:"
          ls -la target/surefire-reports/
      
      - name: Сохранение отчетов и трассировок
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.run_id }}
          path: |
            target/surefire-reports/
            traces/
            target/allure-results/
          retention-days: 7
          if-no-files-found: warn
      
      - name: Сохранение логов
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ github.run_id }}
          path: |
            /home/runner/.m2/repository/
            /tmp/playwright-java-*/
          retention-days: 7